# Bulk Price: CSV Editor by Win-Win Apps
# Partner app created 2026-04-15 via Dev Dashboard

client_id = "279eeda1422d9930dbb5845154fd712e"
name = "Bulk Price: CSV Editor"
handle = "bulk-price-csv-editor-1"
application_url = "https://bulk-price-csv-editor.fly.dev"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2025-01"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = ["app/scopes_update"]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
  uri = "/webhooks/compliance"

[access_scopes]
scopes = "read_products,write_products,read_inventory,write_inventory"

[auth]
redirect_urls = [
  "https://bulk-price-csv-editor.fly.dev/auth/callback",
  "https://bulk-price-csv-editor.fly.dev/auth/shopify/callback",
  "https://bulk-price-csv-editor.fly.dev/api/auth"
]

[pos]
embedded = false
